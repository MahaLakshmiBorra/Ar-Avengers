<!DOCTYPE html>
<html>
<head>
    <title>Sentinel VR - Road Safety</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Ground / Road -->
    <a-plane position="0 0 -5" rotation="-90 0 0" width="30" height="30" color="#555"></a-plane>

    <!-- Title -->
    <a-text value="SENTINEL VR - ROAD SAFETY AWARENESS"
            position="-4 4 -6"
            color="blue"
            width="10">
    </a-text>

    <!-- ================= SCENARIO 1 ================= -->
    <!-- Car -->
    <a-box position="-3 0.5 -3" color="red"></a-box>

    <!-- Scenario Text -->
    <a-text value="Scenario 1: Using Mobile While Driving"
            position="-5 2 -3"
            color="black">
    </a-text>

    <a-text value="Driver is distracted..."
            position="-5 1.5 -3"
            color="red">
    </a-text>

    <a-text value="ACCIDENT OCCURS!"
            position="-5 1 -3"
            color="black">
    </a-text>

    <a-text value="Prevention: Avoid mobile usage while driving"
            position="-5 0.5 -3"
            color="green">
    </a-text>

    <!-- ================= SCENARIO 2 ================= -->
    <!-- Bike -->
    <a-cylinder position="3 0.5 -3" radius="0.5" height="1" color="orange"></a-cylinder>

    <a-text value="Scenario 2: No Helmet"
            position="1 2 -3"
            color="black">
    </a-text>

    <a-text value="Rider without helmet..."
            position="1 1.5 -3"
            color="red">
    </a-text>

    <a-text value="Severe head injury!"
            position="1 1 -3"
            color="black">
    </a-text>

    <a-text value="Prevention: Always wear a helmet"
            position="1 0.5 -3"
            color="green">
    </a-text>

    <!-- ================= SCENARIO 3 ================= -->
    <!-- Signal Violation -->
    <a-box position="0 0.5 -7" color="yellow"></a-box>

    <a-text value="Scenario 3: Signal Violation"
            position="-2 2 -7"
            color="black">
    </a-text>

    <a-text value="Jumping red signal..."
            position="-2 1.5 -7"
            color="red">
    </a-text>

    <a-text value="Crash happens!"
            position="-2 1 -7"
            color="black">
    </a-text>

    <a-text value="Prevention: Follow traffic rules"
            position="-2 0.5 -7"
            color="green">
    </a-text>

    <!-- ================= FINAL MESSAGE ================= -->
    <a-text value="Drive Safe. Protect Lives."
            position="-3 3 -10"
            color="blue">
    </a-text>

    <a-text value="Every life is valuable."
            position="-3 2.5 -10"
            color="black">
    </a-text>

    <a-text value="Insurance helps in emergency situations."
            position="-3 2 -10"
            color="green">
    </a-text>

    <!-- Camera -->
    <a-camera position="0 1.6 0"></a-camera>

</a-scene>

</body>
</html>
